apiVersion: agentforge/v1
kind: WorkflowPlugin
metadata:
  id: review-escalation-flow
  name: Review Escalation Flow
  version: 0.1.0
  description: Built-in sequential workflow starter that escalates review outcomes into an approval pause.
  tags:
    - builtin
    - workflow
    - starter
    - review-escalation
spec:
  runtime: wasm
  module: ./dist/review-escalation-flow.wasm
  abiVersion: v1
  capabilities:
    - run_workflow
  workflow:
    process: sequential
    roles:
      - id: code-reviewer
      - id: planner-agent
    steps:
      - id: deep-review
        role: code-reviewer
        action: review
        next: [await-approval]
      - id: await-approval
        role: planner-agent
        action: approval
    triggers:
      - event: manual
permissions: {}
source:
  type: builtin
  path: ./plugins/workflows/review-escalation-flow/manifest.yaml
