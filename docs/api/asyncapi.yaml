asyncapi: 3.0.0
info:
  title: AgentForge Realtime and Event Streams
  version: 2026-04-08
  
  description: |-
    This AsyncAPI document covers the current realtime contracts that are not fully represented by the REST-focused OpenAPI document.

    Source of truth:
    - `src-go/internal/server/routes.go`
    - `src-go/internal/ws/events.go`
    - `src-go/internal/ws/handler.go`
    - `src-go/internal/ws/bridge_handler.go`
    - `src-go/internal/ws/im_control_handler.go`
    - `src-go/internal/model/im.go`

    Scope:
    - `/ws` browser-facing realtime push channel
    - `/ws/bridge` TS bridge -> Go runtime event ingress
    - `/ws/im-bridge` Go -> IM bridge delivery stream and websocket ack flow

    Related REST documents remain in `docs/api/openapi.json` and `docs/api/openapi.yaml`.
defaultContentType: application/json
servers:
  localWebSocket:
    host: localhost:7777
    protocol: ws
    pathname: /
    description: Default local websocket server exposed by the Go backend
channels:
  frontendRealtime:
    address: /ws
    title: Frontend realtime websocket
    description: |-
      JWT-protected websocket used by browser/Tauri clients for server-push updates.
      Connection-time query parameters in current repo truth:
      - `token`: optional JWT bearer token when not sent in the Authorization header
      - `projectId`: optional project filter; when present, the hub only pushes matching project events

      Client messages are currently ignored after the handshake; this is a server-push channel.
    messages:
      frontendServerEvent:
        $ref: "#/components/messages/FrontendServerEvent"
  bridgeRuntimeIngress:
    address: /ws/bridge
    title: Bridge runtime ingress websocket
    description: |-
      Internal websocket used by the TS bridge runtime to push normalized agent runtime events into the Go backend.
      The Go backend currently does not emit application-level messages back on this channel; only websocket protocol ping/pong frames apply.
    messages:
      bridgeAgentEvent:
        $ref: "#/components/messages/BridgeAgentEventMessage"
  imBridgeControl:
    address: /ws/im-bridge
    title: IM bridge control websocket
    description: |-
      Control-plane websocket used by IM bridge workers.
      Connection-time query parameters in current repo truth:
      - `bridgeId` (required): bridge instance identifier
      - `afterCursor` (optional): replay deliveries strictly after this cursor

      Server -> bridge messages are delivery payloads. Bridge -> server messages are delivery acknowledgements.

      Companion HTTP control-plane endpoints:
      - `POST /api/v1/im/bridge/register`
      - `POST /api/v1/im/bridge/heartbeat`
      - `POST /api/v1/im/bridge/unregister`
      - `POST /api/v1/im/bridge/bind`
      - `POST /api/v1/im/bridge/ack`
    messages:
      imControlDelivery:
        $ref: "#/components/messages/IMControlDeliveryMessage"
      imDeliveryAck:
        $ref: "#/components/messages/IMDeliveryAckMessage"
operations:
  sendFrontendServerEvent:
    action: send
    channel:
      $ref: "#/channels/frontendRealtime"
    summary: Backend pushes realtime frontend events
    messages:
      - $ref: "#/channels/frontendRealtime/messages/frontendServerEvent"
  receiveBridgeAgentEvent:
    action: receive
    channel:
      $ref: "#/channels/bridgeRuntimeIngress"
    summary: Backend receives normalized bridge runtime events
    messages:
      - $ref: "#/channels/bridgeRuntimeIngress/messages/bridgeAgentEvent"
  sendIMControlDelivery:
    action: send
    channel:
      $ref: "#/channels/imBridgeControl"
    summary: Backend delivers IM control-plane work items to an IM bridge
    messages:
      - $ref: "#/channels/imBridgeControl/messages/imControlDelivery"
  receiveIMDeliveryAck:
    action: receive
    channel:
      $ref: "#/channels/imBridgeControl"
    summary: Backend receives websocket delivery acknowledgements from an IM bridge
    messages:
      - $ref: "#/channels/imBridgeControl/messages/imDeliveryAck"
components:
  messages:
    FrontendServerEvent:
      name: FrontendServerEvent
      title: Frontend websocket event envelope
      summary: Project-scoped or global server-push event emitted on `/ws`
      contentType: application/json
      payload:
        $ref: "#/components/schemas/FrontendEventEnvelope"
      examples:
        - name: taskCreated
          summary: A task was created
          payload:
            type: task.created
            projectId: project-123
            payload:
              id: task-123
              projectId: project-123
              title: Implement review detail panel
              description: Wire decision actions and loading states
              status: inbox
              priority: high
        - name: reviewCompleted
          summary: A review completed
          payload:
            type: review.completed
            projectId: project-123
            payload:
              id: review-123
              taskId: task-123
              prUrl: https://github.com/org/repo/pull/123
              layer: 2
              status: completed
              riskLevel: high
              recommendation: request_changes
        - name: budgetWarning
          summary: A task budget crossed the warning threshold
          payload:
            type: budget.warning
            projectId: project-123
            payload:
              taskId: task-123
              projectId: project-123
              scope: task
              message: "task budget warning: projected $4.20 / $5.00 (84% utilized)"
    BridgeAgentEventMessage:
      name: BridgeAgentEvent
      title: Bridge runtime event envelope
      summary: Normalized runtime event sent from the TS bridge into Go orchestration
      contentType: application/json
      payload:
        $ref: "#/components/schemas/BridgeAgentEvent"
      examples:
        - name: output
          payload:
            task_id: task-123
            session_id: session-456
            timestamp_ms: 1770000000000
            type: output
            data:
              content: Running tests...
              content_type: text/plain
              turn_number: 3
        - name: costUpdate
          payload:
            task_id: task-123
            session_id: session-456
            timestamp_ms: 1770000000100
            type: cost_update
            data:
              input_tokens: 1200
              output_tokens: 180
              cache_read_tokens: 0
              cache_creation_tokens: 0
              cost_usd: 0.18
              budget_remaining_usd: 4.82
              turn_number: 3
    IMControlDeliveryMessage:
      name: IMControlDelivery
      title: IM control-plane delivery
      summary: Backend delivery sent from Go to an IM bridge over `/ws/im-bridge`
      contentType: application/json
      payload:
        $ref: "#/components/schemas/IMControlDelivery"
      examples:
        - name: terminalReviewUpdate
          payload:
            cursor: 42
            deliveryId: delivery-123
            targetBridgeId: bridge-feishu-main
            platform: feishu
            projectId: project-123
            kind: terminal
            content: 代码审查已完成。
            structured:
              title: Code Review Completed
              body: Review review-123 finished.
            targetChatId: oc_xxx
            timestamp: 2026-04-08T12:00:00Z
            signature: sha256=...
    IMDeliveryAckMessage:
      name: IMDeliveryAck
      title: IM control-plane acknowledgement
      summary: Ack frame sent from an IM bridge back to Go over `/ws/im-bridge`
      contentType: application/json
      payload:
        $ref: "#/components/schemas/IMDeliveryAck"
      examples:
        - name: delivered
          payload:
            bridgeId: bridge-feishu-main
            cursor: 42
            deliveryId: delivery-123
            status: delivered
            processedAt: 2026-04-08T12:00:02Z
