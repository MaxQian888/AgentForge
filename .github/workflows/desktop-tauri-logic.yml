name: Desktop Tauri Logic

on:
  workflow_call:
  workflow_dispatch:

jobs:
  desktop-tauri-logic:
    name: Desktop Tauri Logic
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add LLVM tools
        run: rustup component add llvm-tools-preview

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Stub sidecar binaries for Tauri build.rs validation
        shell: bash
        run: |
          # Tauri's build.rs validates that externalBin paths exist even for cargo test --lib.
          # We stub empty placeholders to satisfy the check — unit tests don't spawn sidecars.
          mkdir -p src-tauri/binaries
          for base in server bridge im-bridge; do
            for triple in x86_64-pc-windows-msvc x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
              if [[ "$triple" == *"windows"* ]]; then
                touch "src-tauri/binaries/${base}-${triple}.exe"
              else
                touch "src-tauri/binaries/${base}-${triple}"
              fi
            done
          done

      - name: Run src-tauri lib tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Enforce runtime logic coverage gate
        run: cargo llvm-cov --manifest-path src-tauri/Cargo.toml --lib --ignore-filename-regex 'lib[.]rs$' --fail-under-lines 80 --fail-under-functions 80
