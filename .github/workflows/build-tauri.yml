name: Build Tauri

# ============================================================================
# Tauri Desktop Application Build
# ============================================================================
# Builds the Tauri desktop application for Windows, macOS, and Linux.
# This workflow works OUT-OF-THE-BOX without requiring any secrets.
#
# OPTIONAL SECRETS (for code signing - DISABLED by default):
# ----------------------------------------------------------------
# For macOS Code Signing:
#   - APPLE_CERTIFICATE: Base64-encoded .p12 certificate
#   - APPLE_CERTIFICATE_PASSWORD: Certificate password
#   - APPLE_SIGNING_IDENTITY: Developer ID Application identity
#   - APPLE_ID: Apple ID email
#   - APPLE_PASSWORD: App-specific password
#   - APPLE_TEAM_ID: Apple Developer Team ID
#
# For Windows Code Signing:
#   - WINDOWS_CERTIFICATE: Base64-encoded PFX certificate
#   - WINDOWS_CERTIFICATE_PASSWORD: Certificate password
#
# ⚠️ CODE SIGNING IS DISABLED BY DEFAULT - Tauri builds will be unsigned.
# ============================================================================

on:
  workflow_call:
    inputs:
      updater-enabled:
        required: false
        type: boolean
        default: false
      updater-pubkey:
        required: false
        type: string
        default: ""
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build Tauri App (${{ matrix.platform }})

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch: x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src-go/go.mod
          cache: true
          cache-dependency-path: src-go/go.sum

      - name: Build Go sidecar
        run: node scripts/build-backend.js --current-only

      - name: Validate updater signing inputs
        if: inputs.updater-enabled
        shell: bash
        run: |
          if [ -z "${{ inputs.updater-pubkey }}" ]; then
            echo "Missing required updater public key input: updater-pubkey" >&2
            exit 1
          fi

          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "Missing required signing secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

      # Note: Code signing is OPTIONAL and DISABLED by default.
      # Unsigned builds are suitable for testing and development.
      # For production releases with code signing, uncomment the env section below.
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ inputs.updater-pubkey }}
        shell: bash
        run: |
          if [ "${{ inputs.updater-enabled }}" = "true" ]; then
            pnpm tauri build --config src-tauri/tauri.updater.conf.json --target ${{ matrix.target }}
          else
            pnpm tauri build --target ${{ matrix.target }}
          fi
        continue-on-error: false

      - name: Upload Linux artifacts (AppImage)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-linux-${{ matrix.arch }}-appimage
          path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Linux artifacts (deb)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-linux-${{ matrix.arch }}-deb
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Windows artifacts (MSI)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-windows-${{ matrix.arch }}-msi
          path: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Windows artifacts (NSIS)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-windows-${{ matrix.arch }}-nsis
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload macOS updater artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-macos-${{ matrix.arch }}-updater
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload macOS artifacts (DMG)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-macos-${{ matrix.arch }}-dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 30
          if-no-files-found: warn

      - name: Upload macOS artifacts (App)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-macos-${{ matrix.arch }}-app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 30
          if-no-files-found: warn
