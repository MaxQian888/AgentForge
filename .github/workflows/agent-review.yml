name: Agent PR Review

# ============================================================================
# Automated review for PRs created by AI agents.
# Triggers on PRs from branches prefixed with "agent/".
# Uses Claude Code Action for Layer-1 code review.
# ============================================================================

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  layer1-review:
    if: startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: ""
          review_on_open: true
