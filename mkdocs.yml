site_name: AgentForge
site_description: Agent-driven development management platform
site_url: https://agentforge.dev
docs_dir: docs
repo_url: https://github.com/your-org/AgentForge
repo_name: AgentForge

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Product:
      - product/prd.md
  - Architecture:
      - Agent Orchestration: architecture/agent-orchestration.md
      - Data & Realtime: architecture/data-realtime-design.md
