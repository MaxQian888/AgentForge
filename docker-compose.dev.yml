# Extended dev environment: PostgreSQL + Redis + TS Bridge
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  marketplace:
    build:
      context: ./src-marketplace
      dockerfile: Dockerfile
    container_name: agentforge-marketplace
    ports:
      - "7779:7779"
    environment:
      PORT: "7779"
      ENV: "development"
      POSTGRES_URL: "postgres://agentforge:agentforge@host.docker.internal:5432/agentforge_marketplace?sslmode=disable"
      ALLOW_ORIGINS: "http://localhost:3000,tauri://localhost,http://localhost:1420"
      ARTIFACTS_DIR: "/data/artifacts"
    volumes:
      - marketplace-artifacts:/data/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  bridge:
    build:
      context: ./src-bridge
      dockerfile: Dockerfile
    container_name: agentforge-bridge
    ports:
      - "7800:7800"
    environment:
      PORT: "7800"
      GO_BACKEND_URL: "http://host.docker.internal:7777"
      WS_URL: "ws://host.docker.internal:7777/ws"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  marketplace-artifacts:
