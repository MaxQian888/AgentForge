<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentForge - OAuth Error</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8f9fa; }
        .card { background: white; border-radius: 12px; padding: 2rem; max-width: 420px; width: 90%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .error-code { font-size: 0.85rem; color: #6b7280; margin-bottom: 0.5rem; font-family: monospace; }
        .error-msg { font-size: 1.1rem; color: #dc2626; margin-bottom: 1.5rem; }
        a { display: inline-block; padding: 0.6rem 1.5rem; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; font-size: 0.95rem; }
        a:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <p class="error-code">{{.Code}}</p>
        <p class="error-msg">{{.Message}}</p>
        <a href="{{.HomeURL}}">Back to AgentForge</a>
    </div>
</body>
</html>
